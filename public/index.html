<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yelp Restaurant Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="header">
    <h1>Restaurant Finder</h1>
    <p>Discover great places to eat in any city</p>
  </div>

  <div class="search-wrapper">
    <form id="search-form">
      <span class="search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input type="text" id="city-input" placeholder="Search a city (e.g. New York, Manila, Tokyo...)" />
      <button type="submit"><span class="btn-text">Search</span><span class="btn-spinner"></span></button>
    </form>
  </div>

  <div class="container">
    <p id="message"></p>
    <div id="results"></div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
